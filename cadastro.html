<!-- TÍTULO -->
<h2 class="titulo">Cadastro</h2>

<!-- FORMULÁRIO -->
<div class="container">
<form id="formCadastro">

<!-- Dados do Cliente -->
<fieldset class="mb-4">
<legend>Dados do Cliente</legend>

<div class="mb-3">
<label for="nomeCliente" class="form-label">Nome Completo *</label>
<input type="text" class="form-control" id="nomeCliente" placeholder="Digite seu nome" required>
</div>

<div class="mb-3">
<label for="enderecoCliente" class="form-label">Endereço *</label>
<input type="text" class="form-control" id="enderecoCliente" placeholder="Digite seu endereço" required>
</div>

<div class="mb-3">
<label for="cpfCliente" class="form-label">CPF *</label>
<input type="text" class="form-control" id="cpfCliente" placeholder="Digite apenas números" 
       pattern="[0-9]{11}" inputmode="numeric" required>
</div>

<div class="mb-3">
<label class="form-label">Sexo</label><br>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="sexoCliente" id="sexoMasculino" value="Masculino" required>
<label class="form-check-label" for="sexoMasculino">Masculino</label>
</div>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="sexoCliente" id="sexoFeminino" value="Feminino">
<label class="form-check-label" for="sexoFeminino">Feminino</label>
</div>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="sexoCliente" id="sexoOutro" value="Outro">
<label class="form-check-label" for="sexoOutro">Outro</label>
</div>
</div>

<div class="mb-3">
<label for="telefoneCliente" class="form-label">Telefone</label>
<input type="tel" class="form-control" id="telefoneCliente" placeholder="Digite apenas números" 
       pattern="[0-9]{10,11}" inputmode="numeric">
</div>

<div class="mb-3">
<label for="emailCliente" class="form-label">E-mail *</label>
<input type="email" class="form-control" id="emailCliente" placeholder="exemplo@email.com" required>
</div>
</fieldset>

<!-- Dados do Pet -->
<fieldset class="mb-4">
<legend>Dados do Pet</legend>

<div class="mb-3">
<label for="nomePet" class="form-label">Nome *</label>
<input type="text" class="form-control" id="nomePet" placeholder="Nome do seu pet" required>
</div>

<div class="mb-3">
<label for="racaPet" class="form-label">Raça</label>
<input type="text" class="form-control" id="racaPet" placeholder="Raça do pet">
</div>

<div class="mb-3">
<label for="idadePet" class="form-label">Idade</label>
<input type="number" class="form-control" id="idadePet" placeholder="Idade em anos">
</div>
</fieldset>

<!-- Agendamento -->
<fieldset class="mb-4">
<legend>Agendamento</legend>

<div class="mb-3">
<label for="dataAgendamento" class="form-label">Data *</label>
<input type="date" class="form-control" id="dataAgendamento" required>
</div>

<div class="mb-3">
<label for="horaAgendamento" class="form-label">Hora *</label>
<input type="time" class="form-control" id="horaAgendamento" required>
</div>

<div class="mb-3">
<label class="form-label">Opção de atendimento *</label><br>
<div class="form-check">
<input class="form-check-input" type="radio" name="atendimento" id="teleBusca" value="Tele-busca" required>
<label class="form-check-label" for="teleBusca">Tele-busca</label>
</div>
<div class="form-check">
<input class="form-check-input" type="radio" name="atendimento" id="entregaLocal" value="Entrega no local">
<label class="form-check-label" for="entregaLocal">Entrega no local</label>
</div>
</div>
</fieldset>

<!-- BOTÕES ESTILIZADOS -->
<button type="submit" class="btn" style="background-color:#065d84; color:white;">Enviar Cadastro</button>
<button type="reset" class="btn" style="background-color:#d9d9d9; color:#333;">Limpar Formulário</button>

</form>
